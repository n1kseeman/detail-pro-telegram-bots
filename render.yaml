services:
  - type: worker
    name: detail-pro-telegram-bots
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    disk:
      name: detail-pro-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_GROUP_ID
        sync: false
      - key: MANAGER_USERNAME
        value: detailpro_manager
      - key: MANAGER_PHONE
        sync: false
      - key: CENTER_NAME
        value: Detail Pro
      - key: DATABASE_PATH
        value: /data/detail_pro.db
      - key: TIMEZONE
        value: Europe/Minsk
